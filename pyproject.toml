[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.ruff]
line-length = 100
# Home Assistant tourne en Python 3.13, même si le poste de dev est en 3.11.
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "RET", "C4", "D", "ASYNC"]
ignore = [
  # Conventions de docstring que Home Assistant n'applique pas non plus.
  "D203",
  "D213",
]

[tool.ruff.lint.pydocstyle]
convention = "pep257"

[tool.ruff.lint.per-file-ignores]
# Les tests lisent/écrivent des fichiers en synchrone : c'est volontaire et sans
# risque hors boucle d'événements de production.
"tests/**" = ["ASYNC240"]

[tool.ruff.lint.isort]
# `homeassistant` est une dépendance externe pour un custom component.
known-third-party = ["homeassistant"]
force-sort-within-sections = true
combine-as-imports = true
